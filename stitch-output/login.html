<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-highest": "#37342f",
                      "outline": "#ab8981",
                      "secondary-container": "#812e17",
                      "on-tertiary-fixed": "#001d35",
                      "secondary": "#ffb5a1",
                      "on-secondary": "#5f1602",
                      "secondary-fixed": "#ffdbd1",
                      "inverse-surface": "#e8e1da",
                      "on-primary": "#601400",
                      "surface-tint": "#ffb5a1",
                      "secondary-fixed-dim": "#ffb5a1",
                      "surface-dim": "#15130f",
                      "on-secondary-fixed": "#3b0800",
                      "on-primary-container": "#541000",
                      "primary-container": "#fd592a",
                      "inverse-primary": "#b22c00",
                      "on-primary-fixed": "#3b0800",
                      "on-tertiary-container": "#002b4c",
                      "on-surface": "#e8e1da",
                      "error": "#ffb4ab",
                      "tertiary-fixed-dim": "#9dcaff",
                      "surface-container-high": "#2c2a25",
                      "primary-fixed-dim": "#ffb5a1",
                      "surface": "#15130f",
                      "on-error-container": "#ffdad6",
                      "on-secondary-container": "#ffa086",
                      "error-container": "#93000a",
                      "primary-fixed": "#ffdbd1",
                      "surface-container-low": "#1e1b17",
                      "on-primary-fixed-variant": "#882000",
                      "tertiary-fixed": "#d1e4ff",
                      "tertiary-container": "#2b95ec",
                      "background": "#15130f",
                      "outline-variant": "#5b4039",
                      "surface-variant": "#37342f",
                      "tertiary": "#9dcaff",
                      "primary": "#ffb5a1",
                      "inverse-on-surface": "#33302b",
                      "surface-container": "#221f1b",
                      "on-secondary-fixed-variant": "#7d2c15",
                      "on-tertiary-fixed-variant": "#00497c",
                      "on-tertiary": "#003257",
                      "on-error": "#690005",
                      "surface-container-lowest": "#100e0a",
                      "on-background": "#e8e1da",
                      "surface-bright": "#3c3933",
                      "on-surface-variant": "#e4beb5"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Manrope"],
                      "label": ["Manrope"]
              }
            },
          },
        }
      </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0E0C08;
            background-image: radial-gradient(circle at 50% 50%, #15130F 0%, #0E0C08 100%);
        }
        .obsidian-card {
            background-color: #1A1916;
            border: 1px solid #2E2C28;
            border-radius: 8px;
        }
        .password-input {
            background-color: #0E0C08;
            border: 1px solid #2E2C28;
            color: #F5F0E8;
        }
        .password-input:focus {
            border-color: #FFB5A1;
            outline: none;
            box-shadow: 0 0 0 1px #FFB5A1;
        }
        .primary-btn {
            background-color: #E84A1C;
            color: #F5F0E8;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
      </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Login Container -->
<main class="w-full max-w-sm">
<!-- Architectural Noir Centered Card -->
<div class="obsidian-card p-10 flex flex-col space-y-8">
<!-- Header Section -->
<div class="space-y-1">
<h1 class="text-2xl font-bold tracking-tight text-[#F5F0E8] headline">
                    Access
                </h1>
<div class="h-px w-8 bg-primary-container"></div>
</div>
<!-- Interaction Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-4">
<div class="relative">
<label class="sr-only" for="password">Password</label>
<input class="password-input w-full px-4 py-3.5 text-sm rounded-lg transition-all duration-300 placeholder:text-on-surface-variant/40" id="password" placeholder="Password" type="password"/>
</div>
</div>
<button class="primary-btn w-full py-4 px-6 text-sm font-bold tracking-widest uppercase flex items-center justify-center group transition-all duration-300 hover:brightness-110 active:scale-[0.98]" type="submit">
<span>Enter</span>
<span class="material-symbols-outlined ml-2 text-lg transition-transform duration-300 group-hover:translate-x-1">
                        arrow_forward
                    </span>
</button>
</form>
<!-- Bottom Detail (Minimalist Anchor) -->
<div class="flex justify-center">
<span class="text-[10px] tracking-[0.3em] uppercase text-on-surface-variant/20 font-medium">
                    Obsidian Secure Terminal
                </span>
</div>
</div>
<!-- Atmospheric Element -->
<div class="fixed bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-outline-variant/10 to-transparent"></div>
</main>
</body></html>
